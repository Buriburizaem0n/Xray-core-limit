name: Auto Release from Upstream

on:
  schedule:
    - cron: '30 0 * * *' # Run daily at 00:30 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch and Sync Missing Releases
        env:
          GH_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest 5 releases (including pre-releases)
          UPSTREAM_RELEASES=$(gh api repos/XTLS/Xray-core/releases?per_page=5)
          
          # Iterate through releases (reverse order to publish oldest first)
          echo "$UPSTREAM_RELEASES" | jq -c 'reverse | .[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            IS_PRERELEASE=$(echo "$release" | jq -r '.prerelease')
            RELEASE_BODY=$(echo "$release" | jq -r '.body')
            
            # Check if the release already exists locally
            if gh release view "$TAG_NAME" > /dev/null 2>&1; then
              echo "Release $TAG_NAME already exists. Skipping."
              continue
            fi
            
            echo "Creating missing release $TAG_NAME (Prerelease: $IS_PRERELEASE)..."
            
            # Save notes to temporary file
            echo "$RELEASE_BODY" > release_notes.txt
            
            PRERELEASE_FLAG=""
            if [ "$IS_PRERELEASE" = "true" ]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            
            gh release create "$TAG_NAME" \
              $PRERELEASE_FLAG \
              --title "$RELEASE_NAME" \
              --notes-file release_notes.txt \
              --target main || echo "Failed to create release $TAG_NAME, skipping..."
            
            echo "Successfully initiated release $TAG_NAME!"
          done

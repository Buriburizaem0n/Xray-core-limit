name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/XTLS/Xray-core.git
          git fetch upstream

      - name: Merge Upstream
        id: merge
        run: |
          # Try to merge upstream/main into current branch
          git merge upstream/main --no-edit || true
          
          if [ -f .git/MERGE_HEAD ]; then
            echo "Merge resulted in conflicts. Attempting to auto-resolve unimportant files..."
            
            for target in README.md go.mod go.sum; do
              if git ls-files -u | grep -q "$target"; then
                echo "Auto-resolving $target with --ours"
                git checkout --ours "$target"
                git add "$target"
              fi
            done
            
            # Auto-resolve .pb.go files
            if git ls-files -u | grep -q "\.pb\.go$"; then
              echo "Auto-resolving .pb.go files with --ours"
              git ls-files -u | grep "\.pb\.go$" | awk '{print $4}' | sort -u | xargs -r git checkout --ours
              git ls-files -u | grep "\.pb\.go$" | awk '{print $4}' | sort -u | xargs -r git add
            fi
            
            # Check if Unmerged files still exist
            if git ls-files -u | grep -q .; then
              echo "Real conflicts still exist in core code. Aborting merge and creating PR..."
              git merge --abort
              git checkout -b sync-upstream upstream/main
              echo "merged=false" >> "$GITHUB_OUTPUT"
            else
              echo "All conflicts auto-resolved. Committing..."
              git commit -m "Merge upstream/main (auto-resolve config/pb.go conflicts)"
              echo "merged=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Merge successful without conflicts."
            echo "merged=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Changes (Clean Merge)
        if: steps.merge.outputs.merged == 'true'
        run: |
          git push origin main

      - name: Create Pull Request (Conflict)
        if: steps.merge.outputs.merged == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push -f origin sync-upstream
          # Check if PR already exists
          if gh pr list --head sync-upstream | grep "sync-upstream"; then
            echo "PR already exists. Make sure to update it."
          else
            gh pr create \
              --base main \
              --head sync-upstream \
              --title "Sync from upstream/main" \
              --body "This PR syncs upstream/main into your repository. There were merge conflicts with your customized code. Please resolve them."
          fi
